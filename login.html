<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso - VerisArt</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Geist:wght@600;700&family=Inter:wght@400;600&family=JetBrains+Mono:wght@500&family=Material+Symbols+Outlined"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body class="flex flex-col min-h-screen bg-[#f7f9fb]">
    <div id="navbar-container"></div>
    <script>
        fetch('Navbar.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('navbar-container').innerHTML = data;
            });
    </script>

    <main class="flex-grow flex items-center justify-center p-6">
        <div class="max-w-5xl w-full flex flex-col md:flex-row card-main md:h-[550px]">
            <div class="w-full md:w-1/2 bg-black relative p-12 text-white flex flex-col justify-end">
                <img src="https://images.unsplash.com/photo-1579783902614-a3fb3927b6a5?q=80&w=1000"
                    class="absolute inset-0 w-full h-full object-cover opacity-70">
                <div class="relative z-10">
                    <h2 class="text-4xl font-heading font-bold mb-4">Integridad Forense.</h2>
                    <p class="text-gray-400 text-sm">Acceda al panel de certificación de alta seguridad.</p>
                </div>
            </div>
            <div class="w-full md:w-1/2 p-10 flex flex-col justify-center">
                <h1 class="text-2xl font-heading font-bold mb-8">Iniciar Sesión</h1>
                <form id="login-form" class="space-y-4">
                    <input type="email" id="login-email" class="input-standard" placeholder="Correo Electrónico"
                        required>
                    <input type="password" id="login-pass" class="input-standard" placeholder="Contraseña" required>
                    <button type="submit" class="btn-black w-full py-4 mt-2">ENTRAR AL SISTEMA</button>
                </form>
                <script>
                    document.getElementById('login-form').addEventListener('submit', function (e) {
                        e.preventDefault();
                        const email = document.getElementById('login-email').value;
                        const pass = document.getElementById('login-pass').value;
                        if (email === 'veris@gmail.com' && pass === '1234') {
                            window.location.href = 'dashboard.html';
                        } else {
                            alert('Credenciales incorrectas. Para este prototipo, por favor ingresa:\nCorreo: veris@gmail.com\nContraseña: 1234');
                        }
                    });
                </script>
                <p class="mt-6 text-center text-xs text-gray-500">¿No tienes cuenta? <a href="register.html"
                        class="text-secondary font-bold">Regístrate</a></p>
            </div>
        </div>
    </main>

    <div id="footer-container"></div>
    <script>
        fetch('footer.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('footer-container').innerHTML = data;
            });
    </script>
</body>

</html>
