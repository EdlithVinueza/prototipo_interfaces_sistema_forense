<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bóveda Digital - VerisArt</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Geist:wght@600;700&family=Inter:wght@400;600&family=JetBrains+Mono:wght@500&family=Material+Symbols+Outlined"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body class="flex flex-col">

    <div id="navbar-container"></div>
    <script>
        fetch('nav-session.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('navbar-container').innerHTML = data;
            });
    </script>

    <main class="flex-grow flex p-6">
        <div class="max-w-7xl w-full m-auto">

        <!-- Header de Bienvenida -->
        <div id="dashboard-header" class="flex flex-col md:flex-row justify-between items-end mb-6 gap-6">
            <div>
                <span class="font-mono text-[10px] text-secondary font-bold tracking-[0.3em] uppercase">Status: Agente
                    Conectado</span>
                <h1 class="text-4xl font-heading font-bold text-gray-900 mt-2 tracking-tight">Bóveda de Certificados
                </h1>
            </div>
            <div class="flex gap-3">
                <button
                    class="btn-black !bg-white !text-black border border-black !text-[10px] uppercase tracking-widest">
                    Historial Completo
                </button>
                <button onclick="startCertification()" class="btn-black !text-[10px] uppercase tracking-widest">
                    Nueva Certificación
                </button>
            </div>
        </div>

        <!-- VISTA: DASHBOARD PRINCIPAL -->
        <div id="dashboard-view">
            <div id="dashboard-table-container"></div>
            <script>
                fetch('dashboard-table.html')
                    .then(response => response.text())
                    .then(data => {
                        document.getElementById('dashboard-table-container').innerHTML = data;
                        
                        // Agregar el listener del buscador después de inyectar el HTML
                        document.getElementById('search-filter').addEventListener('input', (e) => {
                            renderCertificates(e.target.value);
                        });
                        
                        // Cargar JSON y renderizar
                        loadCertificatesData();
                    });
            </script>
        </div>

        <!-- VISTA: FLUJO DE CERTIFICACIÓN (SPA) -->
        <div id="certification-view" class="hidden">
            <!-- Stepper Dinámico -->
            <div class="stepper-container" id="stepper-ui">
                <!-- Se actualiza por JS -->
            </div>

            <!-- Contenedor del Paso Actual -->
            <div id="step-content-container">
                <!-- Aquí se inyecta step1.html, step2.html, etc. -->
            </div>
        </div>

        <script>
            let db_certificates = [];

            const fallback_data = [
                {
                    id_certificado: "CERT-2026-0001",
                    titulo_obra: "Paisaje Cibernético 2077",
                    phash_visual: "001100110011100111111001",
                    hash_criptografico: "e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855",
                    fecha_sello: "2026-06-10 14:30:00",
                    estado: "VALIDO",
                    autor: "Edlith Vinueza"
                },
                {
                    id_certificado: "CERT-2026-0002",
                    titulo_obra: "Retrato Abstracto V1",
                    phash_visual: "101010101010101010101010",
                    hash_criptografico: "8d969eef6ecad3c29a3a629280e686cf0c3f5d5a86aff3ca12020c923adc6c92",
                    fecha_sello: "2026-06-08 09:15:22",
                    estado: "VALIDO",
                    autor: "Edlith Vinueza"
                }
            ];

            // Función para cargar los expedientes
            function loadCertificatesData() {
                fetch('expedientes.json')
                    .then(response => {
                        if (!response.ok) throw new Error("Network error");
                        return response.json();
                    })
                    .then(data => {
                        db_certificates = data;
                        renderCertificates();
                    })
                    .catch(error => {
                        console.warn('Usando datos de respaldo (CORS/Fetch falló):', error);
                        db_certificates = fallback_data;
                        renderCertificates();
                    });
            }

            function renderCertificates(query = "") {
                const container = document.getElementById('certificates-container');
                const filtered = db_certificates.filter(cert => {
                    const term = query.toLowerCase();
                    return cert.id_certificado.toLowerCase().includes(term) || 
                           cert.hash_criptografico.toLowerCase().includes(term) ||
                           cert.fecha_sello.toLowerCase().includes(term) ||
                           cert.titulo_obra.toLowerCase().includes(term);
                });

                if (filtered.length === 0) {
                    container.innerHTML = `
                        <div class="p-16 flex flex-col items-center justify-center text-center h-full">
                            <span class="material-symbols-outlined text-6xl text-gray-200 mb-4">document_scanner</span>
                            <h3 class="text-xl font-heading font-bold text-gray-900 mb-2">No tienes certificados</h3>
                            <p class="text-gray-500 text-sm max-w-sm">No encontramos registros digitales que coincidan. ¡Comencemos a certificar tu primera obra!</p>
                            <button onclick="startCertification()" class="btn-black mt-6 !py-3 !px-6 uppercase tracking-widest text-[10px]">Iniciar Certificación</button>
                        </div>
                    `;
                    return;
                }

                let html = `
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-gray-50 text-[10px] font-bold text-gray-400 uppercase tracking-widest border-b border-gray-100">
                                    <th class="p-6">ID Expediente</th>
                                    <th class="p-6">Título Obra</th>
                                    <th class="p-6">pHash (Visual)</th>
                                    <th class="p-6">Hash Criptográfico (SHA-256)</th>
                                    <th class="p-6">Fecha Sello</th>
                                    <th class="p-6">Estado</th>
                                    <th class="p-6">Acciones</th>
                                </tr>
                            </thead>
                            <tbody>
                `;

                filtered.forEach(cert => {
                    html += `
                        <tr class="border-b border-gray-50 hover:bg-[#f7f9fb] transition-colors">
                            <td class="p-6 font-mono text-xs font-semibold text-gray-900">${cert.id_certificado}</td>
                            <td class="p-6 text-xs text-gray-800 font-medium">${cert.titulo_obra}</td>
                            <td class="p-6 font-mono text-[10px] text-gray-500 truncate max-w-[100px]" title="${cert.phash_visual}">${cert.phash_visual.substring(0, 10)}...</td>
                            <td class="p-6 font-mono text-[10px] text-gray-500 truncate max-w-[120px]" title="${cert.hash_criptografico}">${cert.hash_criptografico.substring(0, 16)}...</td>
                            <td class="p-6 text-xs text-gray-600">${cert.fecha_sello}</td>
                            <td class="p-6 text-[10px] font-bold text-green-600">${cert.estado}</td>
                            <td class="p-6 flex gap-2">
                                <button onclick="previewJSON('${cert.id_certificado}')" class="text-secondary hover:text-green-600 transition-colors" title="Previsualizar Expediente">
                                    <span class="material-symbols-outlined text-lg">visibility</span>
                                </button>
                                <button onclick="downloadJSON('${cert.id_certificado}')" class="text-gray-400 hover:text-black transition-colors" title="Descargar Expediente JSON">
                                    <span class="material-symbols-outlined text-lg">download</span>
                                </button>
                            </td>
                        </tr>
                    `;
                });

                html += `</tbody></table></div>`;
                container.innerHTML = html;
            }

            // (El listener del buscador se agregó al cargar dashboard-table.html)

            // --- LÓGICA SPA: FLUJO DE CERTIFICACIÓN ---

            function startCertification() {
                document.getElementById('dashboard-header').classList.add('hidden');
                document.getElementById('dashboard-view').classList.add('hidden');
                document.getElementById('certification-view').classList.remove('hidden');
                loadStep(1);
            }

            function cancelCertification() {
                document.getElementById('certification-view').classList.add('hidden');
                document.getElementById('dashboard-view').classList.remove('hidden');
                document.getElementById('dashboard-header').classList.remove('hidden');
            }

            function loadStep(stepNumber) {
                renderStepper(stepNumber);
                fetch(`certification/step${stepNumber}.html`)
                    .then(response => response.text())
                    .then(html => {
                        document.getElementById('step-content-container').innerHTML = html;
                    });
            }

            function renderStepper(currentStep) {
                const stepper = document.getElementById('stepper-ui');
                const checkIcon = `<div class="w-5 h-5 bg-white rounded-full flex items-center justify-center"><span class="material-symbols-outlined text-[14px] text-secondary font-bold">check</span></div>`;
                
                let s1_class = currentStep >= 1 ? (currentStep > 1 ? 'completed' : 'active') : '';
                let s1_content = currentStep >= 1 ? checkIcon : '1';
                let s1_line = currentStep > 1 ? '!bg-[#7df1b8]' : (currentStep === 1 ? 'style="background: linear-gradient(to right, #7df1b8 50%, #e2e8f0 50%);"' : '');

                let s2_class = currentStep >= 2 ? (currentStep > 2 ? 'completed' : 'active') : '';
                let s2_content = currentStep >= 2 ? checkIcon : '2';
                let s2_line = currentStep > 2 ? '!bg-[#7df1b8]' : (currentStep === 2 ? 'style="background: linear-gradient(to right, #7df1b8 50%, #e2e8f0 50%);"' : '');

                let s3_class = currentStep >= 3 ? (currentStep > 3 ? 'completed' : 'active') : '';
                let s3_content = currentStep >= 3 ? checkIcon : '3';
                let s3_line = currentStep > 3 ? '!bg-[#7df1b8]' : (currentStep === 3 ? 'style="background: linear-gradient(to right, #7df1b8 50%, #e2e8f0 50%);"' : '');

                let s4_class = currentStep === 4 ? 'active' : '';
                let s4_content = currentStep === 4 ? checkIcon : '4';

                stepper.innerHTML = `
                    <div class="step-item ${s1_class}">
                        <div class="step-circle">${s1_content}</div>
                        <span class="step-label">Carga Forense</span>
                        <div class="step-connector ${s1_line}"></div>
                    </div>
                    <div class="step-item ${s2_class}">
                        <div class="step-circle">${s2_content}</div>
                        <span class="step-label">Datos de Obra</span>
                        <div class="step-connector ${s2_line}"></div>
                    </div>
                    <div class="step-item ${s3_class}">
                        <div class="step-circle">${s3_content}</div>
                        <span class="step-label">Firma del Autor</span>
                        <div class="step-connector ${s3_line}"></div>
                    </div>
                    <div class="step-item ${s4_class}">
                        <div class="step-circle">${s4_content}</div>
                        <span class="step-label">Descarga Final</span>
                    </div>
                `;
            }
        </script>

        </div>
    </main>

    <footer class="footer-standard sticky bottom-0 z-50 bg-white py-6 px-6 md:px-12 border-t border-gray-100 flex flex-col md:flex-row justify-between items-center gap-6 mt-auto w-full">
        <div class="flex gap-8 text-[10px] font-bold text-gray-400 uppercase tracking-widest">
            <a href="#" class="hover:text-black">Aviso Legal</a>
            <a href="#" class="hover:text-black">Privacidad</a>
            <a href="#" class="hover:text-black">Términos</a>
            <a href="#" class="hover:text-black">Soporte PKI</a>
        </div>
        <span class="font-heading font-bold text-lg tracking-tighter">VERISART</span>
    </footer>

    <!-- MODAL PARA PREVISUALIZAR EXPEDIENTE JSON -->
    <div id="modal-json-preview" class="modal-overlay" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 9999; justify-content: center; items-center;">
        <div class="bg-white p-6 rounded-2xl max-w-2xl w-full m-4 shadow-2xl border border-gray-100 relative">
            <button type="button" onclick="closeModalJSON()" class="absolute top-4 right-4 text-gray-400 hover:text-black transition-colors" title="Cerrar">
                <span class="material-symbols-outlined">close</span>
            </button>
            <h3 class="font-heading font-bold text-xl mb-2 flex items-center gap-2">
                <span class="material-symbols-outlined text-secondary">data_object</span> Expediente Forense JSON
            </h3>
            <div class="bg-[#131b2e] rounded-lg p-4 mt-4 overflow-auto max-h-96">
                <pre id="json-preview-content" class="text-[#6cf8bb] font-mono text-xs leading-relaxed whitespace-pre-wrap"></pre>
            </div>
            <button id="btn-download-modal" class="btn-black w-full mt-4 py-3 uppercase font-bold tracking-widest text-[10px] flex justify-center items-center gap-2">
                <span class="material-symbols-outlined text-sm">download</span> Descargar Expediente
            </button>
        </div>
    </div>

    <script>
        function previewJSON(id) {
            const cert = db_certificates.find(c => c.id_certificado === id);
            if (cert) {
                document.getElementById('json-preview-content').textContent = JSON.stringify(cert, null, 2);
                document.getElementById('btn-download-modal').setAttribute('onclick', `downloadJSON('${id}')`);
                document.getElementById('modal-json-preview').style.display = 'flex';
            }
        }
        function closeModalJSON() {
            document.getElementById('modal-json-preview').style.display = 'none';
        }
        function downloadJSON(id) {
            const cert = db_certificates.find(c => c.id_certificado === id);
            if (cert) {
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(cert, null, 2));
                const dlAnchorElem = document.createElement('a');
                dlAnchorElem.setAttribute("href", dataStr);
                dlAnchorElem.setAttribute("download", `expediente_${id}.json`);
                dlAnchorElem.click();
            }
        }
    </script>
</body>
</html>
